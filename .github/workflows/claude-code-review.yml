name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          post_review_comment: true
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

      - name: Post review summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const reviewStatus = '${{ steps.claude-review.outcome }}';
            let message = '## 🤖 Claude Code Review Complete\n\n';

            if (reviewStatus === 'success') {
              message += '✅ Code review completed successfully.\n\n';
              message += 'Claude has analyzed the changes in this PR. ';
              message += 'If no specific issues were found, that means the code follows best practices and looks good to merge!\n\n';
              message += '_Review powered by [Claude Code](https://claude.com/claude-code)_';
            } else {
              message += '⚠️ Code review completed with warnings or encountered an issue.\n\n';
              message += 'Please check the workflow logs for details.\n\n';
              message += '_Review powered by [Claude Code](https://claude.com/claude-code)_';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });

